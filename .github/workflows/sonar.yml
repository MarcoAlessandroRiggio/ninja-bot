name: Sonar
on:
  push:
    branches:
      - develop

jobs:
  Analize:
    runs-on: ubuntu-latest
    steps:
      - name: Analyze with SonarCloud
        run: mvn clean verify sonar:sonar -Dsonar.organization=marco-riggio -Dsonar.projectKey=ninja-bot -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}