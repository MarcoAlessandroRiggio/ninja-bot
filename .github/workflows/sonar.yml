name: Sonar
on:
  push:
    branches:
      - develop

jobs:
  Analize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Analyze with SonarCloud
        run: mvn --batch-mode --update-snapshots clean verify sonar:sonar -Dsonar.organization=marco-riggio -Dsonar.projectKey=ninja-bot -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}